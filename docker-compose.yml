services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fantasy-news-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    command: ["python", "-m", "news_eda.main_producer", "--interval", "2"]
    restart: "no"

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    command: ["python", "-m", "news_eda.main_consumer", "--name", "compose-consumer", "--topic", "kingdom.politics", "--topic", "arena.sports"]
    restart: unless-stopped

  topology-ui:
    build:
      context: .
      dockerfile: Dockerfile.topology-ui
    container_name: fantasy-news-topology-ui
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
